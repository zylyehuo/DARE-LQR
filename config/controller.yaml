/**:
  ros__parameters:

    # ========================================================================
    # 0. 插件注册
    # ========================================================================
    plugin_name: "lqr"
    plugins:
      controller: "controller/lqr"

    # ========================================================================
    # 1. 底盘适配：速度、几何与转向约束（更换底盘优先修改）
    # ========================================================================
    # 该组描述控制接口允许范围和双阿克曼几何。
    target_linear_velocity: 1.0
    min_linear_velocity: 0.06
    max_linear_velocity: 1.0
    max_angular_velocity: 1.2
    max_linear_acceleration: 0.8
    max_linear_deceleration: 0.8
    wheel_base: 0.494
    track_width: 0.364
    max_steering_angle: 0.698
    min_turning_radius: 0.59
    dual_ackermann_mode_radius_margin: 0.03

    # ========================================================================
    # 2. 底盘适配：实车静态执行模型（更换底盘重新辨识）
    # ========================================================================
    # 该组只补偿前馈与转向执行差异，不修改 DARE-LQR 反馈增益。
    empirical_feedforward_compensation_enable: true
    empirical_yaw_rate_breakpoints: [0.0, 0.02, 0.05, 0.1, 0.15, 0.2]
    empirical_yaw_rate_gains: [1.0, 0.92, 0.92, 0.89, 0.855, 0.82]
    empirical_feedforward_compensation_strength: 0.7
    empirical_feedforward_compensation_max_scale: 1.18
    empirical_feedforward_compensation_min_yaw_rate: 0.01
    steering_delay_compensation_enable: true
    positive_curvature_steering_delay: 0.18
    negative_curvature_steering_delay: 0.09
    steering_delay_compensation_strength: 0.7
    steering_delay_max_preview_distance: 0.18
    straight_steering_bias_enable: false
    straight_steering_bias_central_angle: 0.00147
    straight_steering_bias_activation_curvature: 0.02
    straight_steering_bias_max_lateral_error: 0.05
    straight_steering_bias_max_heading_error: 0.08
    straight_steering_bias_terminal_fade_distance: 0.6

    # ========================================================================
    # 3. 底盘适配：动态、制动与方向差异（更换底盘重新辨识）
    # ========================================================================
    # 该组来自实车动态响应；换底盘时应重新测量，而不是沿用数值。
    empirical_yaw_dynamics_enable: true
    empirical_max_yaw_acceleration: 0.6
    empirical_sign_change_max_yaw_acceleration: 0.35
    empirical_terminal_max_yaw_acceleration: 0.25
    empirical_terminal_yaw_accel_distance: 0.6
    empirical_curvature_rate_speed_floor: 0.1
    empirical_braking_speed_limit_enable: true
    empirical_braking_quadratic_coefficient: 0.3
    empirical_braking_linear_coefficient: 0.085
    empirical_braking_safety_margin: 0.0
    empirical_braking_activation_distance: 0.25
    reverse_straight_stabilization_enable: true
    reverse_straight_feedback_scale: 0.65
    reverse_straight_speed_limit: 1.0
    reverse_straight_lateral_enter: 0.01
    reverse_straight_lateral_exit: 0.005
    reverse_straight_heading_enter: 0.02
    reverse_straight_heading_exit: 0.008
    reverse_straight_feedback_max_central_steering: 0.04
    reverse_convergence_heading_enable: true
    reverse_convergence_heading_gain: 0.55
    reverse_convergence_heading_max: 0.025
    reverse_convergence_heading_deadband: 0.004
    reverse_convergence_straight_lookahead: 1.0
    reverse_convergence_terminal_start_distance: 1.6
    reverse_convergence_terminal_lookahead_floor: 0.45
    reverse_terminal_longitudinal_speed_gain: 0.5
    reverse_terminal_correction_min_velocity: 0.012
    reverse_terminal_crawl_min_along_distance: 0.002
    reverse_terminal_crawl_max_lateral_error: 0.01

    # ========================================================================
    # 4. 误差、状态与精度阈值（定位系统或精度要求变化时修改）
    # ========================================================================
    # 停车误差统一采用 base_link -> base_link；首次停车阈值为 0.01 m。
    lateral_error_limit: 0.25
    heading_error_limit: 0.7
    lateral_error_deadband: 0.0015
    heading_error_deadband: 0.002
    path_acquisition_speed_limit_enable: true
    path_acquisition_enter_lateral_error: 0.05
    path_acquisition_exit_lateral_error: 0.012
    path_acquisition_full_lateral_error: 0.25
    path_acquisition_enter_heading_error: 0.1
    path_acquisition_exit_heading_error: 0.025
    path_acquisition_full_heading_error: 0.4
    path_reacquisition_enter_lateral_error: 0.08
    path_reacquisition_enter_heading_error: 0.18
    path_acquisition_min_speed: 0.25
    path_acquisition_max_speed: 0.7
    path_acquisition_stable_cycles: 5
    path_acquisition_convergence_heading_enable: true
    path_acquisition_convergence_heading_gain: 0.8
    path_acquisition_convergence_heading_max: 0.14
    path_acquisition_convergence_heading_deadband: 0.008
    path_acquisition_convergence_lookahead: 1.2
    path_acquisition_convergence_max_reference_curvature: 0.05
    path_acquisition_lateral_feedback_scale: 0.45
    path_acquisition_feedback_scale: 0.75
    path_acquisition_max_central_steering: 0.12
    terminal_stop_distance: 0.01
    terminal_stop_exit_distance: 0.03
    terminal_stop_hold_cycles: 1
    terminal_stop_s_tolerance: 0.008
    terminal_stop_lateral_tolerance: 0.01
    terminal_alignment_lateral_activation: 0.01
    terminal_alignment_heading_activation: 0.015
    forward_terminal_lateral_convergence_deadband: 0.004
    reverse_terminal_lateral_convergence_deadband: 0.003
    straight_output_curvature_deadband: 0.006
    straight_output_deadband_lateral_error: 0.006
    straight_output_deadband_heading_error: 0.012
    straight_sign_reversal_min_curvature: 0.025

    # ========================================================================
    # 5. 四状态 DARE-LQR 核心参数
    # ========================================================================
    # 状态：[e_y, e_y_dot, e_psi, e_psi_dot]；输入：中央转角修正量。
    lqr_q_lateral: 12.0
    lqr_q_lateral_rate: 0.3
    lqr_q_heading: 10.0
    lqr_q_heading_rate: 0.25
    lqr_r_steering: 4.2
    lqr_feedback_scale: 1.0
    lqr_error_rate_filter_alpha: 0.25
    straight_reference_curvature_threshold: 0.025
    straight_feedback_scale: 0.55
    curve_feedback_scale: 1.18
    straight_feedback_max_central_steering: 0.085

    # ========================================================================
    # 6. 路径参考、短预瞄与曲率前馈
    # ========================================================================
    path_curvature_feedforward_gain: 1.0
    path_curvature_window_distance: 0.18
    curve_preview_enable: true
    curve_preview_min_distance: 0.08
    curve_preview_speed_gain: 0.25
    curve_preview_max_distance: 0.38
    curve_preview_samples: 7
    curve_preview_blend: 0.5
    curve_preview_activation_curvature: 0.03
    lookahead_min_distance: 0.3
    lookahead_max_distance: 0.85
    lookahead_speed_gain: 0.42
    direction_filter_margin: 0.08
    minimum_reference_length: 0.4
    terminal_heading_lookback_distance: 0.65

    # ========================================================================
    # 7. 弯道速度规划与出弯恢复
    # ========================================================================
    curve_anticipation_enable: true
    curve_anticipation_min_distance: 0.9
    curve_anticipation_speed_gain: 1.5
    curve_anticipation_max_distance: 2.5
    curve_anticipation_samples: 20
    curve_anticipation_curvature_threshold: 0.05
    curve_anticipation_lateral_acceleration: 0.1
    curve_anticipation_min_speed: 0.24
    curve_anticipation_deceleration: 0.65
    curve_anticipation_safety_distance: 0.25
    curvature_speed_limit_enable: true
    max_lateral_acceleration: 0.32
    error_speed_limit_enable: true
    lateral_error_speed_gain: 0.55
    heading_error_speed_gain: 0.38
    speed_curvature_lateral_error_gain: 0.36
    speed_curvature_heading_error_gain: 0.66
    post_curve_recovery_enable: true
    post_curve_enter_curvature: 0.06
    post_curve_exit_curvature: 0.025
    post_curve_recovery_distance: 2.4
    post_curve_recovery_speed_limit: 1.0
    post_curve_feedback_scale: 0.85

    # ========================================================================
    # 8. 终点自然驶入、对齐与停车
    # ========================================================================
    # 2 m 外尽可能保持 1 m/s，进入终点段后按 0.5*s 单调减速。
    terminal_stop_on_path_end_enable: true
    terminal_stop_latch_enable: true
    terminal_slowdown_enable: true
    terminal_slowdown_distance: 2.0
    terminal_min_linear_velocity: 0.01
    terminal_longitudinal_speed_gain: 0.5
    terminal_correction_min_velocity: 0.01
    terminal_correction_speed_max: 0.03
    terminal_lateral_error_speed_floor_gain: 1.2
    terminal_distance_error_speed_floor_gain: 0.2
    terminal_alignment_enable: true
    terminal_alignment_speed_limit_enable: false
    terminal_alignment_start_distance: 1.2
    terminal_alignment_max_speed: 1.0
    terminal_alignment_min_speed: 1.0
    terminal_alignment_feedback_scale: 0.95
    reverse_terminal_alignment_start_distance: 1.6
    reverse_terminal_alignment_max_speed: 1.0
    reverse_terminal_alignment_min_speed: 1.0
    reverse_terminal_alignment_feedback_scale: 0.9
    forward_terminal_lateral_convergence_enable: true
    forward_terminal_lateral_convergence_start_distance: 1.2
    forward_terminal_lateral_convergence_fade_distance: 0.03
    forward_terminal_lateral_convergence_gain: 1.0
    forward_terminal_lateral_convergence_max_steering: 0.025
    reverse_terminal_lateral_convergence_enable: true
    reverse_terminal_lateral_convergence_start_distance: 1.6
    reverse_terminal_lateral_convergence_fade_distance: 0.012
    reverse_terminal_lateral_convergence_gain: 1.05
    reverse_terminal_lateral_convergence_max_steering: 0.028
    terminal_monotonic_speed_enable: true
    terminal_monotonic_release_distance: 2.2

    # ========================================================================
    # 9. 曲率、转向与速度指令平滑
    # ========================================================================
    curvature_smoothing_enable: true
    curvature_smoothing_alpha: 0.55
    curve_entry_smoothing_alpha: 0.85
    curve_exit_smoothing_alpha: 0.82
    curve_entry_rate_multiplier: 1.4
    max_curvature_rate: 3.0
    straight_sign_change_smoothing_alpha: 0.3
    straight_sign_change_rate_multiplier: 0.45
    command_smoothing_enable: true
    command_smoothing_alpha: 0.65
    command_deceleration_alpha: 0.65

    # ========================================================================
    # 10. 控制周期
    # ========================================================================
    control_period: 0.1
